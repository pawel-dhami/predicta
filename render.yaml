services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  - type: web
    name: placeiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APIFY_TOKEN
        sync: false
    healthCheckPath: /api/health

  # ── React Frontend (Static Site) ────────────────────────────────────────────
  - type: web
    name: placeiq-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
